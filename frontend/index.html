<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数智网格数据运营监控</title>
    <style>html, body { height: 100%; margin: 0; } #app { height: 100%; }</style>
  </head>
  <body>
    <div id="app">
      <div style="width:100vw;height:100vh;overflow:hidden;background:radial-gradient(ellipse at top,#122036 0%,#0B1220 60%);display:flex;align-items:center;justify-content:center;">
        <div style="text-align:center;">
          <h1 class="text-white" style="margin:0;color:#fff;font-size:30px;font-weight:600;line-height:1.2;letter-spacing:8px;">数智网格数据运营监控</h1>
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;">
            <div style="width:40px;height:1px;background:linear-gradient(90deg, transparent, #22D3EE)"></div>
            <div style="width:4px;height:4px;border-radius:9999px;background:#22D3EE"></div>
            <div style="width:40px;height:1px;background:linear-gradient(90deg, #22D3EE, transparent)"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
