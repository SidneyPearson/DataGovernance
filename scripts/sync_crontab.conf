# ============================================================
# DataGovernance 数据同步定时任务
# 安装方式: crontab -e
# ============================================================

# 每天早上 6:00 - 同步工单日指标到 dws_grid_workorder_daily
0 6 * * * curl -s -X POST "http://localhost:18082/DataGovernance/grid/sync/workorder/daily" -H "Content-Type: application/json" -d '{"statDate": "'$(date +\%Y-\%m-\%d)'"}' >> /tcc/app/dataGovernance/logs/sync.log 2>&1

# 每天早上 6:30 - 同步级联日志到 dws_grid_cascade_log
30 6 * * * curl -s -X POST "http://localhost:18082/DataGovernance/grid/sync/cascade/log" -H "Content-Type: application/json" -d '{"statDate": "'$(date +\%Y-\%m-\%d)'"}' >> /tcc/app/dataGovernance/logs/sync.log 2>&1

# 每天晚上 23:00 - 补充近7天数据（防止漏同步）
0 23 * * * curl -s -X POST "http://localhost:18082/DataGovernance/grid/sync/workorder/daily/batch" -H "Content-Type: application/json" -d '{"startDate": "'$(date -d '7 days ago' +\%Y-\%m-\%d)'", "endDate": "'$(date +\%Y-\%m-\%d)'"}' >> /tcc/app/dataGovernance/logs/sync.log 2>&1

# ============================================================
# 说明
# ============================================================
# 日志位置: /tcc/app/dataGovernance/logs/sync.log
# 手动触发: curl -X POST http://localhost:18082/DataGovernance/grid/sync/workorder/daily
# ============================================================